<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfitod Method</title>
    
    <!-- Mengambil font modern dari Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-orange: #f97316;
            --accent-yellow: #fbbf24;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: 
                linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(249, 115, 22, 0.2)),
                url('https://i.ibb.co/0MvWf5c/aho-girl-bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .brand { font-size: 32px; font-weight: 800; color: var(--primary-orange); margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .nav-links { display: flex; gap: 20px; justify-content: center; color: var(--text-main); font-weight: 600; background: rgba(255,255,255,0.7); padding: 10px 20px; border-radius: 30px; }
        
        .main-card { background-color: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border: 1px solid rgba(249, 115, 22, 0.2); }
        .upload-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 5px; }
        .upload-subtitle { text-align: center; color: var(--text-sub); margin-bottom: 25px; font-size: 14px; }
        
        .drop-zone { border: 3px dashed var(--primary-orange); border-radius: 20px; padding: 40px 10px; text-align: center; margin-bottom: 25px; background-color: rgba(249, 115, 22, 0.05); cursor: pointer; transition: all 0.3s ease; }
        .drop-zone:hover { background-color: rgba(249, 115, 22, 0.1); border-color: var(--accent-yellow); }

        .options-card { background-color: #f1f5f9; border-radius: 15px; padding: 15px; margin-bottom: 25px; }
        .badge { background-color: var(--accent-yellow); color: #1f2937; padding: 3px 10px; border-radius: 15px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        
        .btn-patch { background: linear-gradient(to right, var(--primary-orange), #ea580c); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: 800; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px -3px rgba(249, 115, 22, 0.5); transition: all 0.3s ease; }
        .btn-patch:hover { transform: translateY(-2px); box-shadow: 0 6px 20px -3px rgba(249, 115, 22, 0.7); }
        .btn-patch:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }
        
        .footer { margin-top: 30px; text-align: center; color: #4b5563; font-size: 14px; font-weight: 600; }
        .footer a { color: var(--primary-orange); text-decoration: none; font-weight: 800; }
        
        #videoPreview { display: none; width: 100%; margin-top: 15px; border-radius: 10px; }
        #statusText { font-weight: 700; color: var(--primary-orange); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">🎥 Alfitod Method</div>
        <div class="nav-links">
            <span>📖 Guide</span> <span>⭐ safe&fast</span> <span>🛠️ Method</span>
        </div>
    </div>

    <div class="main-card">
        <div class="upload-title">☁️ Upload Your Video</div>
        <div class="upload-subtitle">dapatkan pengalaman upload tanpa terkompres</div>
        
        <!-- Input File Tersembunyi -->
        <input type="file" id="fileInput" accept="video/*" style="display: none;">
        
        <div class="drop-zone" id="uploadBox">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p id="fileName" style="margin-top: 10px; font-weight: 600;">Masukan video disini</p>
            <p style="font-size: 12px; color: var(--text-sub);">MP4, MOV, M4V • Maksimal 500MB</p>
            <video id="videoPreview" controls></video>
        </div>

        <div class="options-card">
            <label style="font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" checked style="width: 18px; height: 18px; accent-color: var(--primary-orange);">
                <span>Enable TikTok-Optimized Encoding <span class="badge">PREMIUM</span></span>
            </label>
            <p style="font-size: 12px; color: var(--text-sub); margin-top: 8px; padding-left: 28px;">Hanya aktifkan jika video Anda perlu re-encoding ulang.</p>
        </div>

        <button class="btn-patch" id="patchBtn" disabled>Mulai Patcher</button>
        <p id="statusText" style="text-align: center;"></p>
    </div>

    <div class="footer">
        <p>Follow TikTok: <a href="https://tiktok.com/@Alfitod_" target="_blank">@Alfitod_</a></p>
    </div>

    <script>
        // Logika Patcher
        function patchFPSAJAMethod(arrayBuffer) {
            const data = new Uint8Array(arrayBuffer);
            // Logika patching kamu akan berjalan di sini
            return { output: data };
        }

        // Logika UI & Integrasi
        const fileInput = document.getElementById("fileInput");
        const patchBtn = document.getElementById("patchBtn");
        const uploadBox = document.getElementById("uploadBox");
        const videoPreview = document.getElementById("videoPreview");
        const fileName = document.getElementById("fileName");
        const statusText = document.getElementById("statusText");

        let selectedFile = null;

        uploadBox.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (e.target.files[0]) {
                selectedFile = e.target.files[0];
                patchBtn.disabled = false;
                fileName.textContent = selectedFile.name;
                videoPreview.src = URL.createObjectURL(selectedFile);
                videoPreview.style.display = "block";
                statusText.textContent = "File siap diproses.";
            }
        };

        patchBtn.onclick = async () => {
            if (!selectedFile) return;
            
            patchBtn.disabled = true;
            statusText.textContent = "Processing...";
            
            try {
                const buffer = await selectedFile.arrayBuffer();
                const result = patchFPSAJAMethod(buffer);
                
                const blob = new Blob([result.output], { type: 'video/mp4' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${selectedFile.name.split('.')[0]}_patched.mp4`;
                a.click();
                
                statusText.textContent = "Done! Video berhasil di-patch.";
            } catch (err) {
                statusText.textContent = "Error saat memproses.";
                console.error(err);
            } finally {
                patchBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
